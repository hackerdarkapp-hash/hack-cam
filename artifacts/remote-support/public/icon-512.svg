<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#000000"/>
  <!-- Camera body -->
  <rect x="60" y="160" width="300" height="210" rx="28" fill="none" stroke="#22c55e" stroke-width="16"/>
  <!-- Lens outer ring -->
  <circle cx="210" cy="265" r="78" fill="none" stroke="#22c55e" stroke-width="14"/>
  <!-- Lens mid -->
  <circle cx="210" cy="265" r="48" fill="none" stroke="#22c55e" stroke-width="8" opacity="0.5"/>
  <!-- Lens inner fill -->
  <circle cx="210" cy="265" r="24" fill="#22c55e" opacity="0.3"/>
  <circle cx="210" cy="265" r="10" fill="#22c55e"/>
  <!-- Viewfinder bump -->
  <rect x="360" y="205" width="82" height="55" rx="16" fill="none" stroke="#22c55e" stroke-width="14"/>
  <!-- Recording dot -->
  <circle cx="108" cy="178" r="14" fill="#22c55e"/>
  <!-- Signal waves -->
  <path d="M400 148 Q440 190 400 232" fill="none" stroke="#22c55e" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <path d="M418 126 Q472 190 418 254" fill="none" stroke="#22c55e" stroke-width="12" stroke-linecap="round" opacity="0.4"/>
  <path d="M436 104 Q508 190 436 276" fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round" opacity="0.2"/>
  <!-- Bottom label -->
  <text x="210" y="420" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" letter-spacing="8" fill="#22c55e" opacity="0.6">REMOTE OPS</text>
</svg>
